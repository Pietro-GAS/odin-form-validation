<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css/style.css">
        <title>My form</title>
    </head>
    <body>
        <form id="my-form" novalidate>
            <p>
                <label for="email">Email:</label>
                <input id="email" name="email" type="email">
                <span id="error" aria-live="polite"></span>
            </p>
            <p>
                <label for="country">Country:</label>
                <input id="country" name="country" type="text">
                <span id="error" aria-live="polite"></span>
            </p>
            <p>
                <label for="p-code">Postal code:</label>
                <input id="p-code" name="p-code" type="text">
                <span id="error" aria-live="polite"></span>
            </p>
            <p>
                <label for="pwd">Password:</label>
                <input id="pwd" name="pwd" type="password">
                <span id="error" aria-live="polite"></span>
            </p>
            <p>
                <label for="pwd-confirm">Confirm password:</label>
                <input id="pwd-confirm" name="pwd-confirm" type="password">
                <span id="error" aria-live="polite"></span>
            </p>
            <div>
                <button class="button" id="button-cancel" type="reset">Cancel</button>
                <button class="button" id="button-save" type="submit">Save</button>
            </div>
        </form>
    </body>
    <script src="./scripts/script.js" defer></script>
</html>
